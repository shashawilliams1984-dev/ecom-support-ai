<!DOCTYPE html>
<html>
<head>
<title>AI Customer Support</title>

<style>
body {
font-family: Arial;
background:#f5f5f5;
}

#chatbox {
width:600px;
height:400px;
border:1px solid #ccc;
background:white;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
}

.user {
text-align:right;
color:blue;
margin:8px;
}

.ai {
text-align:left;
color:green;
margin:8px;
}

#inputArea{
display:flex;
gap:10px;
}

#message{
flex:1;
padding:8px;
}
</style>

</head>

<body>

<h2>AI Customer Support</h2>

<div id="chatbox"></div>

<div id="inputArea">
<input id="message" placeholder="Ask about your order...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

async function sendMessage(){

let message = document.getElementById("message").value

let chatbox = document.getElementById("chatbox")

chatbox.innerHTML += `<div class="user">You: ${message}</div>`

document.getElementById("message").value=""

let response = await fetch("http://127.0.0.1:8000/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:message})
})

let data = await response.json()

chatbox.innerHTML += `<div class="ai">AI: ${data.answer}</div>`

chatbox.scrollTop = chatbox.scrollHeight

}

</script>

</body>
</html>
