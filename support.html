<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopify AI Support</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 400px;
            height: 500px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            color: white;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .message {
            margin: 5px 0;
        }

        .user {
            color: #00ff88;
        }

        .ai {
            color: #66ccff;
        }

        .input-area {
            display: flex;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            background: #00cc66;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h2>🛒 Shopify AI Support</h2>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input id="userInput" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let userId = localStorage.getItem("user_id");

    function addMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");

        const msg = document.createElement("div");
        msg.classList.add("message");

        if (sender === "You") {
            msg.classList.add("user");
            msg.innerHTML = "<strong>You:</strong> " + text;
        } else {
            msg.classList.add("ai");
            msg.innerHTML = "<strong>AI:</strong> " + text;
        }

        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value;

        if (!message) return;

        addMessage("You", message);
        input.value = "";

        try {
            const response = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    user_id: userId
                })
            });

            const data = await response.json();

            // Save user_id if first time
            if (!userId) {
                userId = data.user_id;
                localStorage.setItem("user_id", userId);
            }

            addMessage("AI", data.response);

        } catch (error) {
            addMessage("AI", "Error connecting to server");
        }
    }

    // Optional: press Enter to send
    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
